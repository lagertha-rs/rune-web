name: Build

on:
  pull_request:
    branches: [main, prod]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress dist/**/*.html
          fail: true
